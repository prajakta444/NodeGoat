name: NodeGoat DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  IMAGE_NAME: nodegoat-app

jobs:

# 🔍 1. SAST + Dependency Scan
  sast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Run Snyk SAST & Dependency Scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true   # (don’t break pipeline initially)

# 🐳 2. Build Docker Image
  build:
    needs: sast
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME .

# 🔎 3. Container Security Scan
  container-scan:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Scan Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: nodegoat-app
        severity: HIGH,CRITICAL
        exit-code: 0   # don't fail yet

# 🌐 4. Run App + DAST Scan
  dast:
    needs: container-scan
    runs-on: ubuntu-latest

    steps:
    - name: Run NodeGoat Container
      run: |
        docker run -d -p 4000:4000 --name nodegoat nodegoat-app
        sleep 25

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:4000'
        fail_action: false

# 📊 5. Upload Reports
  report:
    needs: dast
    runs-on: ubuntu-latest

    steps:
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: report_html.html

# ✅ 6. Final Status
  done:
    needs: report
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ NodeGoat DevSecOps Pipeline Completed!"
